     empty states, search, filters, data tables, badges, and

<!-- ===== TOAST CONTAINER ===== -->
<div id="toast-container" class="fixed bottom-6 right-6 z-[9999] space-y-3"></div>


<!-- ===== CONFIRM MODAL ===== -->
<div id="confirm-modal" class="hidden fixed inset-0 z-[9998] flex items-center justify-center bg-black/60 backdrop-blur-sm">
  <div id="confirm-modal-card" class="bg-slate-800 border border-slate-700/60 rounded-2xl shadow-2xl shadow-black/40 w-full max-w-sm mx-4 p-6 text-center transform transition-all duration-200 scale-95 opacity-0">
    <div id="confirm-modal-icon" class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4"></div>
    <h3 id="confirm-modal-title" class="text-lg font-semibold text-white mb-2"></h3>
    <p id="confirm-modal-message" class="text-sm text-slate-400 mb-6"></p>
    <div class="flex items-center justify-center gap-3">
      <button id="confirm-modal-cancel" class="px-4 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700 transition-colors cursor-pointer">
        Cancel
      </button>
      <button id="confirm-modal-confirm" class="px-5 py-2 rounded-lg text-sm font-medium text-white transition-colors cursor-pointer flex items-center gap-2">
        Confirm
      </button>
    </div>
  </div>
</div>


<!-- ===== LOADING OVERLAY ===== -->
<div id="loading-overlay" class="hidden fixed inset-0 z-[9997] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm">
  <div class="flex flex-col items-center gap-4">
    <div class="loading-ring w-10 h-10 border-3 border-slate-600 border-t-cyan-400 rounded-full"></div>
    <span class="text-sm text-slate-400">Loading...</span>
  </div>
</div>
